<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizForge</title>
    <link rel="stylesheet" href="quizforge.css">
    <link rel="shortcut icon" href="Assets/facivo.png" type="image/x-icon">
</head>
<body>
    <main>
        <div id="menu_window">
            <h1>QuizForge App</h1>
            <button id="select_btn">Rozpocznij</button>
            <button id="history_btn">Historia gier</button>
        </div>
        <div id="history_window">
            <h1>Historia gier</h1>
            <button id="menu_btn">Wróć do menu</button>
        </div>
        <div id="select_window">
            <h1>Select Window</h1>
            <select name="category_select" id="cat_select">
                <option value="cat_selector" disabled selected>Select category</option>
                <option value="1">Random</option>
            </select>
            <select name="difficulty_select" id="dif_select">
                <option value="dif_selector" disabled selected>Select difficulty</option>
                <option value="random">Random</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="start_btn">Start!</button>
        </div>
        <div id="quiz_window">
            <h1>Quiz Window</h1>
            <h2 id="timer"></h2>
            <h2 id="question_cat"></h2>
            <h2 id="question_dif"></h2>
            <h1 id="question_title"></h1>
            <div id="answ_section">
                
            </div>
        </div>
        <div id="score_window">
            <h1>Score Window</h1>
            <button id="score_btn">Wróć do menu</button>
        </div>
    </main>
</body>
<script src="quizforge.js"></script>
</html>
